# resolver 127.0.0.11 — встроенный DNS Docker; без него nginx падает при старте,
# если имена api/frontend ещё не резолвятся (host not found in upstream).

server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 512m;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location ~ ^/(api/|docs|redoc|openapi\.json) {
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    location / {
        set $zp_frontend frontend:80;
        proxy_pass http://$zp_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
