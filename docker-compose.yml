# Корневой .env: DOMAIN, EMAIL, CERTBOT_STAGING (0 — боевой LE, 1 — staging для тестов)
#
# Запуск:
#   docker compose up -d --build
#
# Первый выпуск сертификата (DOMAIN/EMAIL из .env):
#   docker compose --profile init-cert run --rm certbot-issue
#   docker compose restart nginx
#
# После renew в фоне:
#   docker compose exec nginx nginx -s reload

name: zeroproblems

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

x-api-env: &api-env
  PYTHONPATH: /app
  OLLAMA_HOST: http://ollama:11434
  OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
  ONNX_DEVICE: ${ONNX_DEVICE:-cuda}

services:
  ollama:
    image: ollama/ollama:latest
    container_name: zeroproblems-ollama
    <<: *gpu
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    container_name: zeroproblems-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        echo "Pulling Ollama model: $$OLLAMA_MODEL"
        ollama pull "$$OLLAMA_MODEL"
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ONNX_VARIANT: ${ONNX_VARIANT:-gpu}
    container_name: zeroproblems-api
    <<: *gpu
    expose:
      - "8000"
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
      - ./dataset:/app/dataset
      - ./fast_rubert:/app/fast_rubert
    environment:
      <<: *api-env
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: zeroproblems-frontend
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: zeroproblems-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN:-}
    volumes:
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - api

  certbot:
    image: certbot/certbot:latest
    container_name: zeroproblems-certbot
    restart: unless-stopped
    depends_on:
      - nginx
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh
    command:
      - -c
      - |
        trap exit TERM
        while true; do
          certbot renew --webroot -w /var/www/certbot --quiet || true
          sleep 43200 &
          wait $$!
        done

  certbot-issue:
    image: certbot/certbot:latest
    profiles:
      - init-cert
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in root .env}
      EMAIL: ${EMAIL:?set EMAIL in root .env}
      CERTBOT_STAGING: ${CERTBOT_STAGING:-0}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        STAGING=""
        if [ "$$CERTBOT_STAGING" = "1" ] || [ "$$CERTBOT_STAGING" = "true" ]; then
          STAGING="--staging"
        fi
        exec certbot certonly --webroot -w /var/www/certbot \
          -d "$$DOMAIN" \
          --email "$$EMAIL" \
          --agree-tos --no-eff-email --non-interactive $$STAGING

volumes:
  ollama_data:
  certbot_www:
    name: zeroproblems-certbot-www
  certbot_conf:
    name: zeroproblems-certbot-conf
